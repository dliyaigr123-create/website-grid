<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>Sport-shop</title>
    <link rel="stylesheet" href="./components/style.css" />
    <link rel="stylesheet" href="./components/header/header.css" />
    <link rel="stylesheet" href="./components/fonts.css" />
    <link rel="stylesheet" href="./components/main/imagesOne.css">
    <link rel="stylesheet" href="./components/main/gallery.css">
    <link rel="stylesheet" href="./components/footer/footer.css">
  </head>
  <body>
    <div class="big__container">
      <!-- ! HEADER -->
      <header class="header">
        <div class="container">
          <div class="header__wrapper">
            <div class="header__top">
              <h1 class="header__title"><a href="#">ICNDY</a></h1>
              <nav class="header__nav">
                <ul class="header__nav-list">
                  <li class="header__nav-item">
                    <a href="#" class="header__nav-link active">MENS</a>
                  </li>
                  <li class="header__nav-item">
                    <a href="#" class="header__nav-link active">WOMENS</a>
                  </li>
                  <li class="header__nav-item">
                    <a href="#" class="header__nav-link active">BRANDS</a>
                  </li>
                  <li class="header__nav-item">
                    <a href="#" class="header__nav-link active">SALE</a>
                  </li>
                  <li class="header__nav-item">
                    <a href="#" class="header__nav-link active">NEWS</a>
                  </li>
                </ul>
              </nav>
            </div>
            <div class="header__bottom">
            <h2 class="header__title-center">STÜSSY 2014</h2>
            <h3 class="header__subtitle">SHOP NOW</h3>
            <div class="header__arrow"></div>
          </div>
            </div>
        </div>

    </div>
    <main class="main">
      <!-- ! IMAGES SECTION 1 -->
     <div class="container">
      <div class="container__images-wrapper">
        <!-- ! 1 -->
        <div class="container__images-content img-1">
          <img class="logo-img" src="./images/Layer 33.png" alt="#">
          <p class="container__images-content-text">SHOP GOURMET</p>
        </div>
        <!-- ! 2 -->
        <div class="container__images-content img-2">
          <img class="logo-img" src="./images/Layer 23.png" alt="#">
          <p class="container__images-content-text">SHOP CARHARTT</p>
        </div>
        <!-- ! 3 -->
        <div class="container__images-content img-3">
          <img class="logo-img" src="./images/Layer 24.png" alt="#">
          <p class="container__images-content-text">SHOP ADIDAS</p>
        </div>
        <!-- ! 4 -->
        <div class="container__images-content img-4">
          <img class="logo-img" src="./images/Layer 30.png" alt="#">
          <p class="container__images-content-text">10 DEEP SALE</p>
        </div>
        <!-- ! 5 -->
        <div class="container__images-content img-5">
          <img class="logo-img" src="./images/Layer 28.png" alt="#">
          <p class="container__images-content-text">PALACE A/W 2014</p>
        </div>
        <!-- ! 6 -->
        <div class="container__images-content img-6">
          <img class="logo-img" src="./images/Layer 26.png" alt="#">
          <p class="container__images-content-text">TECH PACK</p>
        </div>
      </div>
     </div>
     <!-- ! CONTAINER IMAGES 2 -->
      <div class="big__container">
        <section class="gallery">
          <div class="gallery-wrapper">
            <div class="gallery-images gallery-img-1"></div>
            <div class="gallery-images gallery-img-2"></div>
            <div class="gallery-images gallery-img-3"></div>
            <div class="gallery-images gallery-img-4"></div>
            <div class="gallery-images gallery-img-5"></div>
            <div class="gallery-images gallery-img-6"></div>
            <div class="gallery-images gallery-img-7"></div>
            <div class="gallery-images gallery-img-8"></div>
            <div class="gallery-text">
              <h2 class="gallery-text-title">#ICNDY ON INSTAGRAM</h2>
              <h3 class="gallery-text-subtitle">VIEW HASHTAG</h3>
            </div>
          </div>

      </div>

    <!-- ! Footer -->
     <div class="container">
      <footer class="footer">
        <div class="footer__wrapper">
          <div class="footer__left">
            <p class="footer__text space">©ICNDY 2014</p>
          <nav class="footer__nav">
            <ul class="footer__nav-list">

              <li class="footer__nav-item"><a href="#" class="footer__nav-link active">CONTACT</a></li>

          </nav>

          <div class="footer__images">
            <img src="/images/IG.png" alt="#">
            <img src="./images/FB.png" alt="#">
            <img src="./images/TWTR.png" alt="#">
